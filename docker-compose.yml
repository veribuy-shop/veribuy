services:
  # ─── Infrastructure ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: veribuy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veribuy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veribuy_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-veribuy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veribuy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4-alpine
    container_name: veribuy-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-veribuy_redis_dev}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-veribuy_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: veribuy-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-veribuy}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-veribuy_rabbit_dev}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: veribuy-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-veribuy_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-veribuy_minio_secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Gateway ────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      network: host
    container_name: veribuy-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default

  # ─── Auth Service ───────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: auth-service
      network: host
    container_name: veribuy-auth
    restart: unless-stopped
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://veribuy:veribuy_dev_password@postgres:5432/veribuy?schema=auth
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: veribuy
      POSTGRES_PASSWORD: veribuy_dev_password
      POSTGRES_DB: veribuy
      PORT: 3001
      JAEGER_ENDPOINT: http://jaeger:4318
      RABBITMQ_URL: amqp://veribuy:veribuy_rabbit_dev@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      MINIO_ENDPOINT: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  # ─── User Service ──────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: user-service
      network: host
    container_name: veribuy-user
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT:-3002}:3002"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://veribuy:veribuy_dev_password@postgres:5432/veribuy?schema=users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: veribuy
      POSTGRES_PASSWORD: veribuy_dev_password
      POSTGRES_DB: veribuy
      PORT: 3002
      JAEGER_ENDPOINT: http://jaeger:4318
      RABBITMQ_URL: amqp://veribuy:veribuy_rabbit_dev@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      MINIO_ENDPOINT: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  # ─── Listing Service ───────────────────────────────────────
  listing-service:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: listing-service
      network: host
    container_name: veribuy-listing
    restart: unless-stopped
    ports:
      - "${LISTING_SERVICE_PORT:-3003}:3003"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://veribuy:veribuy_dev_password@postgres:5432/veribuy?schema=listings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: veribuy
      POSTGRES_PASSWORD: veribuy_dev_password
      POSTGRES_DB: veribuy
      PORT: 3003
      JAEGER_ENDPOINT: http://jaeger:4318
      RABBITMQ_URL: amqp://veribuy:veribuy_rabbit_dev@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      MINIO_ENDPOINT: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  # ─── Trust Lens Service ────────────────────────────────────
  trust-lens-service:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: trust-lens-service
      network: host
    container_name: veribuy-trust-lens
    restart: unless-stopped
    ports:
      - "${TRUST_LENS_SERVICE_PORT:-3004}:3004"
    env_file: .env
    environment:
      DATABASE_URL: ${TRUST_LENS_DATABASE_URL}
      PORT: 3004
      JAEGER_ENDPOINT: http://jaeger:4318
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  # ─── Evidence Service ──────────────────────────────────────
  evidence-service:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: evidence-service
      network: host
    container_name: veribuy-evidence
    restart: unless-stopped
    ports:
      - "${EVIDENCE_SERVICE_PORT:-3006}:3006"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://veribuy:veribuy_dev_password@postgres:5432/veribuy?schema=evidence
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: veribuy
      POSTGRES_PASSWORD: veribuy_dev_password
      POSTGRES_DB: veribuy
      PORT: 3006
      JAEGER_ENDPOINT: http://jaeger:4318
      RABBITMQ_URL: amqp://veribuy:veribuy_rabbit_dev@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      MINIO_ENDPOINT: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  # ─── Transaction Service ───────────────────────────────────
  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: transaction-service
      network: host
    container_name: veribuy-transaction
    restart: unless-stopped
    ports:
      - "${TRANSACTION_SERVICE_PORT:-3007}:3007"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://veribuy:veribuy_dev_password@postgres:5432/veribuy?schema=transactions
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: veribuy
      POSTGRES_PASSWORD: veribuy_dev_password
      POSTGRES_DB: veribuy
      PORT: 3007
      JAEGER_ENDPOINT: http://jaeger:4318
      RABBITMQ_URL: amqp://veribuy:veribuy_rabbit_dev@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      MINIO_ENDPOINT: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  # ─── Notification Service ──────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: notification-service
      network: host
    container_name: veribuy-notification
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3008}:3008"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://veribuy:veribuy_dev_password@postgres:5432/veribuy?schema=notifications
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: veribuy
      POSTGRES_PASSWORD: veribuy_dev_password
      POSTGRES_DB: veribuy
      PORT: 3008
      JAEGER_ENDPOINT: http://jaeger:4318
      RABBITMQ_URL: amqp://veribuy:veribuy_rabbit_dev@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      MINIO_ENDPOINT: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  # ─── Frontend ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: production
      network: host
    container_name: veribuy-web
    restart: unless-stopped
    ports:
      - "3010:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      # Server-side API URLs (accessible only in server components and API routes)
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      LISTING_SERVICE_URL: http://listing-service:3003
      TRUST_LENS_SERVICE_URL: http://trust-lens-service:3004
      EVIDENCE_SERVICE_URL: http://evidence-service:3006
      # Client-side API URLs (accessible in browser - use localhost since browser can't reach docker network)
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_APP_NAME: VeriBuy
    depends_on:
      - gateway
      - auth-service
      - user-service
      - listing-service
      - evidence-service
      - transaction-service
      - notification-service

  # ─── Observability Stack ───────────────────────────────────
  
  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: veribuy-jaeger
    restart: unless-stopped
    ports:
      - "5775:5775/udp"   # zipkin.thrift compact
      - "6831:6831/udp"   # jaeger.thrift compact
      - "6832:6832/udp"   # jaeger.thrift binary
      - "5778:5778"       # serve configs
      - "16686:16686"     # UI
      - "14268:14268"     # jaeger.thrift directly from clients
      - "14250:14250"     # gRPC
      - "9411:9411"       # zipkin
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: veribuy-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:10.2.3
    container_name: veribuy-grafana
    restart: unless-stopped
    ports:
      - "3011:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:2.9.3
    container_name: veribuy-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Promtail - Log Collector
  promtail:
    image: grafana/promtail:2.9.3
    container_name: veribuy-promtail
    restart: unless-stopped
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /tmp:/tmp:ro
      - /var/log:/var/log:ro
      - promtail_positions:/var/lib/promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
