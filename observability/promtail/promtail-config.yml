server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape JSON logs from services using Winston
  - job_name: veribuy-json-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: veribuy-json
          __path__: /tmp/veribuy-*-service.json

    pipeline_stages:
      # Parse JSON log entries
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            service: service
            context: context
            environment: environment

      # Set timestamp from log entry
      - timestamp:
          source: timestamp
          format: RFC3339

      # Extract labels
      - labels:
          level:
          service:
          context:
          environment:

  # Scrape logs from /tmp directory (plain text logs)
  - job_name: veribuy-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: veribuy-services
          __path__: /tmp/veribuy-*.log

    pipeline_stages:
      # Parse log level and service name from log file path
      - regex:
          expression: '^/tmp/veribuy-(?P<service>[a-z-]+)\.log$'
          source: filename
      - labels:
          service:

      # Extract log level from log line
      - regex:
          expression: '^\[(?P<timestamp>[^\]]+)\]\s+(?P<level>\w+)\s+'
      - labels:
          level:

      # Extract additional context
      - regex:
          expression: '\[(?P<context>[^\]]+)\]'
      - labels:
          context:

  # Scrape Next.js web logs
  - job_name: veribuy-web
    static_configs:
      - targets:
          - localhost
        labels:
          job: veribuy-web
          service: web
          __path__: /tmp/veribuy-web.log

  # Scrape NestJS service logs
  - job_name: veribuy-nestjs
    static_configs:
      - targets:
          - localhost
        labels:
          job: veribuy-nestjs
          __path__: /tmp/veribuy-*.log

    pipeline_stages:
      # Extract service name from filename
      - regex:
          expression: '^/tmp/veribuy-(?P<service_name>[^.]+)\.log$'
          source: filename
      - labels:
          service_name:

      # Parse NestJS log format
      - regex:
          expression: '^\[Nest\]\s+\d+\s+-\s+(?P<timestamp>\d{2}/\d{2}/\d{4},\s+\d{1,2}:\d{2}:\d{2}\s+[AP]M)\s+(?P<level>LOG|ERROR|WARN|DEBUG|VERBOSE)\s+\[(?P<context>[^\]]+)\]\s+(?P<message>.*)$'
      - labels:
          level:
          context:
      - timestamp:
          source: timestamp
          format: '01/02/2006, 3:04:05 PM'

  # Scrape system logs (optional)
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/*.log

    pipeline_stages:
      - regex:
          expression: '^/var/log/(?P<filename>[^/]+)\.log$'
          source: filename
      - labels:
          filename:
