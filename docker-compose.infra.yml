version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════
  # INFRASTRUCTURE SERVICES (Docker only)
  # ═══════════════════════════════════════════════════════════════

  postgres:
    image: postgres:17-alpine
    container_name: veribuy-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: veribuy
      POSTGRES_PASSWORD: veribuy_dev_password
      POSTGRES_DB: veribuy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veribuy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4-alpine
    container_name: veribuy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  redis_data:
